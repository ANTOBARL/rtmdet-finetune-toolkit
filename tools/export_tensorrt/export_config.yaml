# =============================================================================
# TensorRT Export Configuration — IDLE
#
# This tool is not yet active. Complete the ONNX export first, then use this
# script once the target hardware (Jetson / desktop GPU) and TensorRT SDK
# version are defined.
#
# Edit this file, then run:
#   python export_tensorrt.py
# =============================================================================

checkpoint:
  # Absolute path to the .pth checkpoint to export.
  # Leave null to auto-detect the best checkpoint using project_dir + model_name.
  checkpoint_path: ~

  project_dir: 'C:\Users\AntonioreneèBarletta\Desktop\train_RTM_det\runs\rtmdet'
  model_name: rtmdet_fire_flame_640_s


output:
  # Folder where the TensorRT engine and ONNX intermediate files will be written.
  # Leave null → <checkpoint_dir>/export_tensorrt/
  work_dir: ~


model:
  # Input image size in pixels. Leave null to auto-detect from the run manifest.
  imgsz: ~

  # Inference device.
  device: "cuda:0"


paths:
  # Absolute path to the MMDeploy clone (must be built with TensorRT support).
  mmdeploy_root: 'C:\Users\AntonioreneèBarletta\Desktop\train_RTM_det\mmdeploy'

  # Absolute path to the MMDetection clone.
  mmdet_root: 'C:\Users\AntonioreneèBarletta\Desktop\train_RTM_det\mmdetection'

  # Sample image for MMDeploy graph tracing.
  # Leave null to auto-detect from the dataset recorded in the run manifest.
  sample_image: ~

  # Explicit MMDeploy deploy config (FP16 static by default).
  # Leave null to use the built-in FP16 static default.
  deploy_config: ~


benchmark:
  # Path to the compiled .engine file for benchmarking.
  engine_path: end2end.engine

  # Path to trtexec binary (must be in PATH or set here).
  trtexec_path: trtexec

  iterations: 500
  warmup_ms: 1000
  duration_seconds: 60
  use_cuda_graph: true
  measure_gpu_only: true
