# =============================================================================
# ONNX Export Configuration
# Edit this file, then run:
#   python tools/export_onnx/export_onnx.py
# =============================================================================

# Base folder containing checkpoint and config files.
# All filenames below are resolved relative to this folder.
# If a filename is already an absolute path, base_dir is ignored for that entry.
base_dir: 'C:\path\to\runs\rtmdet\<model_name>\checkpoints'

files:
  # .pth checkpoint file — use a *_weights_only.pth if it came from this
  # pipeline (see README.md, "Checkpoint formats").
  checkpoint: 'best_coco_bbox_mAP_epoch_N_weights_only.pth'

  # MMDetection .py config generated during training
  # (typically in runs/rtmdet/_configs/<model_name>_rtmdet_*.py)
  mmdet_config: '..\..\_configs\<model_name>_rtmdet_s_<timestamp>.py'

  # Any image from the dataset — used by MMDeploy to trace the graph
  sample_image: 'C:\path\to\dataset\valid\images\example.jpg'

  # Output subfolder for end2end.onnx and metadata
  # Default (when null): <base_dir>/export_onnx/
  output_dir: ~


model:
  # Input image size in pixels. Leave null to auto-detect from the mmdet config filename.
  imgsz: ~
  device: "cuda:0"


onnx:
  score_threshold: 0.05
  iou_threshold: 0.5
  keep_top_k: 10
  validate: true


paths:
  # Absolute path to the MMDeploy clone.
  # Default (when null): <repo_root>/mmdeploy
  mmdeploy_root: ~

  # Absolute path to the MMDetection clone.
  # Default (when null): <repo_root>/mmdetection
  mmdet_root: ~
