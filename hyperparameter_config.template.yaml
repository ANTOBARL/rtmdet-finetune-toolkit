# =============================================================================
# RTMDet fine-tuning configuration — TEMPLATE
# Copy this file to hyperparameter_config.yaml and fill in your paths.
#
# Edit hyperparameter_config.yaml, then run:
#   Step 1 — python normalize_dataset.py
#   Step 2 — python finetune_rtmdet.py
# =============================================================================

dataset:
  # Absolute path to your dataset folder.
  # Use the _rtmdet version generated by prepare_yolo_dataset_for_rtmdet.py,
  # or point directly to your YOLO dataset (train/valid/test + data.yaml).
  # Use single quotes to avoid issues with backslashes on Windows.
  dataset_path: 'C:\path\to\your\dataset'

  # Optional: list of class names. Leave empty ([]) to read from data.yaml.
  # Example: [Fire, Smoke]
  class_names: []

  # Optional: number of classes. Leave null to read from data.yaml.
  nc: ~


model:
  # Name used for the run folder and the output package.
  model_name: my_model

  # RTMDet variant: tiny | s | m | l | x  (see README for speed/accuracy tradeoffs).
  variant: s

  # Input image size in pixels. Must be a multiple of 32.
  # TensorRT export is currently static at this value.
  imgsz: 640

  # Path to a custom pretrained checkpoint (.pth).
  # Leave null to download the official COCO checkpoint for the chosen variant.
  pretrained_checkpoint: ~


training:
  epochs: 300
  # Final epochs without mosaic/mixup (fine-tuning phase). All stage-2
  # checkpoints are kept on disk, so a larger value gives the optional SWA
  # step (tools/swa_checkpoint.py) more checkpoints to average.
  stage2_epochs: 35
  batch_size: 32
  val_batch_size: 8
  workers: 8
  val_interval: 5
  base_lr: 0.001
  device: 'cuda'

  # Number of GPUs to train on (uses torch.distributed.run when > 1).
  # Clamped automatically to however many CUDA devices are actually visible.
  num_gpus: 1

  seed: 1

  # Automatic Mixed Precision (recommended: true on modern GPUs).
  amp: true

  # Set true to resume from the last checkpoint in project_dir/model_name/.
  resume: false

  # Log progress every N iterations.
  logger_interval: 100

  # Early stopping: halt training when mAP stops improving.
  # Useful for small datasets where 300 epochs may cause overfitting.
  # early_stopping_patience: stop after this many validations with no improvement.
  # early_stopping_min_delta: minimum mAP gain that counts as improvement.
  early_stopping: false
  early_stopping_patience: 20
  early_stopping_min_delta: 0.001

  # Optional: per-class weight for the classification loss, to counter class
  # imbalance. One entry per class, same order as dataset.class_names (or
  # data.yaml if class_names is left empty). Leave empty ([]) to disable —
  # this is the default and matches stock RTMDet behavior.
  # Run `python balance_dataset.py` to get suggested weights (inverse class
  # frequency, normalized so the most common class = 1.0) printed in this
  # exact format, ready to paste in.
  # Example for 3 classes: [1.0, 4.2, 12.7]
  class_weights: []


pipeline:
  # true  → validate dataset and generate config only; do NOT start training.
  # false → run the full pipeline according to the flags below.
  prepare_only: false

  run_training: true
  run_evaluation: false

  # Export the best checkpoint to ONNX after training.
  # Requires mmdeploy_root to be set in paths.
  # NMS thresholds and output size are configured in onnx_export below.
  save_onnx_weights: false

  run_packaging: true

  # Generate training plots after each run (requires matplotlib: pip install matplotlib).
  # Produces plots/ inside the run folder:
  #   training_curves.png  — loss, validation mAP and learning-rate schedule over time.
  #   per_class_map50.png  — bar chart of mAP50 per class at the best epoch.
  #   confusion_matrix.png — row-normalised confusion matrix (only when run_evaluation: true).
  generate_plots: true

  # Operating point used for the per-threshold P/R/F1 report and the
  # confusion matrix (metrics/threshold_metrics.txt, plots/confusion_matrix.png).
  # Independent from onnx_export.score_threshold/iou_threshold below, which
  # are baked into the exported ONNX graph instead.
  eval_conf_threshold: 0.25
  eval_iou_threshold: 0.50


onnx_export:
  # Score threshold baked into the ONNX graph.
  # Detections with confidence below this value are discarded before NMS.
  # Cannot be lowered at inference without re-exporting.
  # Recommended: 0.05 (light filter, decide at inference time).
  score_threshold: 0.05

  # IoU threshold for Non-Maximum Suppression baked into the graph.
  # Lower → more aggressive deduplication.  Higher → more overlapping boxes.
  iou_threshold: 0.5

  # Maximum number of detections per image (defines the fixed output tensor size).
  # Unused slots are zero-padded. 300 covers any realistic scenario.
  keep_top_k: 300


paths:
  # Leave null to use defaults relative to the current working directory:
  #   project_dir → <cwd>/runs/rtmdet
  #   package_dir → <cwd>/models/rtmdet
  project_dir: ~
  package_dir: ~

  # Absolute path to your MMDetection clone (the folder containing tools/train.py).
  # REQUIRED for training.
  mmdet_root: 'C:\path\to\train_RTM_det\mmdetection'

  # Absolute path to your MMDeploy clone. Only needed when save_onnx_weights: true.
  mmdeploy_root: 'C:\path\to\train_RTM_det\mmdeploy'


preprocessing:
  # Rename dataset files to a canonical format before training.
  # Runs automatically in normalize_dataset.py; keep false here unless you
  # also want the pipeline to re-normalize on every run.
  normalize_names: false

  # Convert YOLO segmentation annotations to bounding boxes automatically.
  convert_segments_to_boxes: true

  # Allow images without a corresponding .txt label (treated as negatives).
  allow_missing_labels: false

  # Stop the pipeline if dataset validation finds errors.
  stop_on_validation_errors: true
